<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintWise Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet">
  <style>
    /* ========================================
       PrintWise Reader — Editorial Typesetting
       ======================================== */

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --page-bg: #faf8f3;
      --text-primary: #1c1915;
      --text-secondary: #6b6560;
      --text-muted: #a09890;
      --accent: #8b4513;
      --rule-color: #d8d2c8;
      --rule-dark: #2a2520;
      --blockquote-bg: #f3f0e8;
      --link-color: #6b4423;
      --body-font: 'Source Serif 4', Georgia, serif;
      --display-font: 'Cormorant Garamond', 'Georgia', serif;
      --ui-font: 'DM Sans', system-ui, sans-serif;
      --content-width: 38em;
      --body-size: 17.5px;
      --leading: 1.72;
    }

    html {
      font-size: var(--body-size);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      font-family: var(--body-font);
      line-height: var(--leading);
      color: var(--text-primary);
      background: var(--page-bg);
    }

    /* === Top bar (screen only) === */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(250, 248, 243, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule-color);
      padding: 0 32px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--ui-font);
      transition: transform 0.3s;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar-logo {
      width: 24px;
      height: 24px;
      background: var(--rule-dark);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--page-bg);
      font-family: var(--display-font);
      font-size: 14px;
      font-weight: 600;
    }

    .toolbar-brand {
      font-family: var(--display-font);
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .toolbar-brand span { color: var(--text-muted); font-weight: 400; }

    .toolbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .toolbar-btn {
      height: 34px;
      padding: 0 16px;
      border: 1.5px solid var(--rule-color);
      border-radius: 7px;
      background: transparent;
      font-family: var(--ui-font);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-btn:hover {
      background: var(--text-primary);
      color: var(--page-bg);
      border-color: var(--text-primary);
    }

    .toolbar-btn svg {
      width: 14px;
      height: 14px;
    }

    .toolbar-btn.primary {
      background: var(--text-primary);
      color: var(--page-bg);
      border-color: var(--text-primary);
    }

    .toolbar-btn.primary:hover {
      background: #3d362f;
    }

    .source-link {
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.15s;
    }

    .source-link:hover { color: var(--text-secondary); }

    /* === Page layout === */
    .page {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 100px 24px 120px;
    }

    /* === Article header === */
    .article-header {
      margin-bottom: 3rem;
      text-align: left;
    }

    .article-header::after {
      content: '';
      display: block;
      width: 48px;
      height: 2.5px;
      background: var(--rule-dark);
      margin-top: 2rem;
    }

    .article-title {
      font-family: var(--display-font);
      font-size: 2.85rem;
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 1.1rem;
      text-wrap: balance;
    }

    .article-meta {
      font-family: var(--ui-font);
      font-size: 0.78rem;
      color: var(--text-secondary);
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.2rem;
      align-items: baseline;
    }

    .article-meta .author {
      font-weight: 500;
      color: var(--text-primary);
    }

    .article-meta .separator {
      color: var(--rule-color);
    }

    /* === Article body === */
    .article-body {
      font-variant-ligatures: common-ligatures;
      hanging-punctuation: first allow-end last;
    }

    .article-body p {
      margin-bottom: 1.15em;
      orphans: 3;
      widows: 3;
    }

    /* Elegant drop cap for first paragraph */
    .article-body > p:first-of-type::first-letter {
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 3.6em;
      float: left;
      line-height: 0.78;
      margin-right: 0.08em;
      margin-top: 0.06em;
      color: var(--text-primary);
    }

    .article-body h1 {
      font-family: var(--display-font);
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.015em;
      margin: 2.5rem 0 1rem;
      color: var(--text-primary);
    }

    .article-body h2 {
      font-family: var(--display-font);
      font-size: 1.55rem;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin: 2.2rem 0 0.85rem;
      color: var(--text-primary);
    }

    .article-body h3 {
      font-family: var(--display-font);
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.3;
      margin: 2rem 0 0.7rem;
      color: var(--text-primary);
    }

    .article-body blockquote {
      margin: 1.8rem 0;
      padding: 1.3rem 1.6rem;
      border-left: 3px solid var(--accent);
      background: var(--blockquote-bg);
      border-radius: 0 6px 6px 0;
      font-style: italic;
    }

    .article-body blockquote p {
      margin-bottom: 0.5em;
    }

    .article-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .article-body ul, .article-body ol {
      margin: 1.2rem 0;
      padding-left: 1.6em;
    }

    .article-body li {
      margin-bottom: 0.4em;
    }

    .article-body a {
      color: var(--link-color);
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(107, 68, 35, 0.3);
      transition: text-decoration-color 0.15s;
    }

    .article-body a:hover {
      text-decoration-color: var(--link-color);
    }

    .article-body hr {
      border: none;
      height: 1px;
      background: var(--rule-color);
      margin: 2.5rem auto;
      max-width: 120px;
    }

    .article-body strong {
      font-weight: 600;
    }

    .article-body em {
      font-style: italic;
    }

    .article-body figure {
      margin: 2rem 0;
    }

    .article-body figcaption {
      font-family: var(--ui-font);
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.6rem;
      text-align: center;
    }

    /* === Footer watermark === */
    .reader-footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--rule-color);
      font-family: var(--ui-font);
      font-size: 0.68rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .reader-footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .reader-footer a:hover { text-decoration: underline; }

    /* === Loading state === */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--rule-color);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-family: var(--ui-font);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* === Error state === */
    .error-view {
      text-align: center;
      padding: 80px 24px;
      font-family: var(--ui-font);
      color: var(--text-secondary);
    }

    .error-view h2 {
      font-family: var(--display-font);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    /* ========================================
       Print Styles — The real magic
       ======================================== */
    @media print {
      .toolbar { display: none !important; }

      html {
        font-size: 11.5pt;
      }

      body {
        background: white;
        color: black;
      }

      .page {
        max-width: none;
        padding: 0;
        margin: 0;
      }

      .article-header {
        margin-bottom: 2rem;
      }

      .article-header::after {
        background: black;
        height: 2px;
        width: 40px;
        margin-top: 1.5rem;
      }

      .article-title {
        font-size: 2.2rem;
        color: black;
      }

      .article-meta {
        color: #555;
      }

      .article-meta .author {
        color: black;
      }

      .article-body blockquote {
        background: none;
        border-left: 2.5px solid #333;
        padding: 0.5rem 1.2rem;
      }

      .article-body a {
        color: black;
        text-decoration: none;
      }

      .article-body hr {
        background: #ccc;
      }

      .reader-footer {
        border-top-color: #ddd;
        color: #999;
        font-size: 8pt;
      }

      /* Page breaks */
      h1, h2, h3 {
        page-break-after: avoid;
        break-after: avoid;
      }

      p, blockquote {
        orphans: 3;
        widows: 3;
      }

      .article-body > p:first-of-type::first-letter {
        color: black;
      }

      @page {
        margin: 2cm 2.4cm;
        size: A4;
      }

      @page :first {
        margin-top: 3cm;
      }
    }

    /* === Responsive adjustments === */
    @media (max-width: 600px) {
      :root {
        --body-size: 16px;
        --leading: 1.65;
      }

      .article-title {
        font-size: 2rem;
      }

      .page {
        padding: 80px 18px 80px;
      }

      .toolbar {
        padding: 0 16px;
      }

      .source-link { display: none; }
    }

    /* Fade-in animation */
    .article-header, .article-body {
      animation: fadeUp 0.5s ease-out both;
    }

    .article-body {
      animation-delay: 0.1s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-logo">P</div>
      <div class="toolbar-brand">Print<span>Wise</span></div>
      <a class="source-link" id="sourceLink" href="#" target="_blank" rel="noopener"></a>
    </div>
    <div class="toolbar-actions">
      <button class="toolbar-btn" id="copyBtn" title="Copy to clipboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy
      </button>
      <button class="toolbar-btn primary" id="printBtn" title="Print">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="page" id="page">
    <div class="loading" id="loadingView">
      <div class="loading-spinner"></div>
      <div class="loading-text">Preparing your reading…</div>
    </div>
  </div>

  <script src="reader.js"></script>
</body>
</html>
