<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: 'DM Sans', sans-serif;
      background: #faf8f4;
      color: #2a2520;
      overflow: hidden;
    }

    .header {
      padding: 20px 22px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #2a2520;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #faf8f4;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand span {
      font-weight: 400;
      color: #8a8078;
    }

    .divider {
      height: 1px;
      background: #e8e2da;
      margin: 16px 22px;
    }

    .body {
      padding: 0 22px 20px;
    }

    .page-info {
      font-size: 11px;
      color: #8a8078;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 16px;
      max-height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #2a2520;
      color: #faf8f4;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      background: #3d362f;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(42, 37, 32, 0.2);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      text-align: center;
      font-size: 11px;
      color: #8a8078;
      margin-top: 8px;
      min-height: 16px;
    }

    .status.error { color: #c44; }

    .processing .btn-text { visibility: hidden; }
    .processing .spinner { display: block; }

    .spinner {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      border: 2px solid rgba(250, 248, 244, 0.3);
      border-top-color: #faf8f4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <div class="brand">Print<span>Wise</span></div>
  </div>
  <div class="divider"></div>

  <div class="body">
    <div class="page-info">Current page</div>
    <div class="page-title" id="pageTitle">Loading…</div>
    <button class="btn-primary" id="extractBtn">
      <span class="btn-text">Extract &amp; Prepare for Print</span>
      <div class="spinner"></div>
    </button>
    <div class="status" id="mainStatus"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
